name: Deploy to NCP Object Storage

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ncp-object-storage
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build:ncp

      - name: Configure NCP Object Storage credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.NCP_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.NCP_SECRET_ACCESS_KEY }}
          aws-region: kr-standard

      - name: Upload to NCP Object Storage
        run: |
          aws s3 sync out s3://imjw-blog/ \
            --endpoint-url https://kr.object.ncloudstorage.com \
            --delete
