name: Deploy to NCP Object Storage

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ncp-object-storage
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build:ncp

      - name: Upload to NCP Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.NCP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NCP_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: kr-standard
        run: |
          aws configure set request_checksum_calculation when_required
          aws configure set response_checksum_validation when_required

          printf "ncp deploy permission check\n" > /tmp/ncp-deploy-check.txt
          aws s3 cp /tmp/ncp-deploy-check.txt s3://imjw-blog/.deploy-check.txt \
            --endpoint-url https://kr.object.ncloudstorage.com \
            --acl public-read \
            --only-show-errors
          aws s3 rm s3://imjw-blog/.deploy-check.txt \
            --endpoint-url https://kr.object.ncloudstorage.com \
            --only-show-errors

          aws s3 sync out s3://imjw-blog/ \
            --endpoint-url https://kr.object.ncloudstorage.com \
            --acl public-read \
            --only-show-errors
